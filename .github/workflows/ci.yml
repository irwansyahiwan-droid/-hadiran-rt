name: CI

# Pagar kualitas sebelum kode masuk main / sebelum deploy:
# typecheck → lint → test → build. Gagal salah satu = PR merah.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Batalkan run lama bila ada push baru di ref yang sama (hemat menit CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
