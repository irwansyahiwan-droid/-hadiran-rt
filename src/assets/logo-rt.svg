<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="Logo RT 46">
  <defs>
    <!-- Ground emas berdimensi: terang di atas → dalam di bawah (koin, bukan kertas flat) -->
    <linearGradient id="rtGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9D451"/>
      <stop offset="0.55" stop-color="#F4C20D"/>
      <stop offset="1" stop-color="#E3A500"/>
    </linearGradient>
    <!-- Sheen cahaya dari atas → permukaan emas terasa melengkung -->
    <radialGradient id="rtSheen" cx="0.5" cy="0.28" r="0.72">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground -->
  <rect width="640" height="640" fill="url(#rtGold)"/>
  <rect width="640" height="640" fill="url(#rtSheen)"/>

  <!-- Cincin segel emerald (identitas "naik kelas": koin bersegel, bukan cakram polos) -->
  <circle cx="320" cy="320" r="252" fill="none" stroke="#0F6B2E" stroke-width="16"/>
  <!-- Cakram putih (sisakan celah emas tipis ke cincin) -->
  <circle cx="320" cy="320" r="230" fill="#FFFFFF"/>

  <!-- Angka identitas -->
  <text x="321" y="430" fill="#0F6B2E"
    font-family="'Helvetica Neue', Arial, Helvetica, sans-serif"
    font-weight="900" font-size="300" letter-spacing="-6"
    text-anchor="middle">46</text>
</svg>
