<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="Logo RT 46">
  <defs>
    <!-- Ground kuning: terang di atas → amber dalam di bawah (permukaan koin melengkung) -->
    <linearGradient id="rtBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD22B"/>
      <stop offset="0.52" stop-color="#FAC200"/>
      <stop offset="1" stop-color="#E7A300"/>
    </linearGradient>
    <!-- Sheen cahaya dari atas -->
    <radialGradient id="rtSheen" cx="0.5" cy="0.20" r="0.92">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Vignette bawah → kedalaman -->
    <radialGradient id="rtVig" cx="0.5" cy="0.94" r="0.95">
      <stop offset="0.5" stop-color="#8C6300" stop-opacity="0"/>
      <stop offset="1" stop-color="#8C6300" stop-opacity="0.30"/>
    </radialGradient>
    <!-- Cakram putih: dome lit-from-top -->
    <linearGradient id="rtDisc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDEFF3"/>
    </linearGradient>
    <!-- Highlight tepi atas cakram (glossy) -->
    <linearGradient id="rtRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Angka hijau ter-ekstrusi (atas terang → bawah gelap) -->
    <linearGradient id="rtNum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C7C3A"/>
      <stop offset="1" stop-color="#0D4E22"/>
    </linearGradient>
    <!-- Bayangan cakram -->
    <filter id="rtDiscShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="11" stdDeviation="16" flood-color="#6A4900" flood-opacity="0.34"/>
    </filter>
    <!-- Kedalaman angka -->
    <filter id="rtNumShadow" x="-25%" y="-25%" width="150%" height="170%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#053A16" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Ground full-bleed (iOS yang memask squircle) -->
  <rect width="640" height="640" fill="url(#rtBg)"/>
  <rect width="640" height="640" fill="url(#rtSheen)"/>
  <rect width="640" height="640" fill="url(#rtVig)"/>

  <!-- Cakram putih timbul -->
  <g filter="url(#rtDiscShadow)">
    <circle cx="320" cy="320" r="232" fill="url(#rtDisc)"/>
  </g>
  <!-- Seam hangat tempat putih bertemu kuning (kesan inset) -->
  <circle cx="320" cy="320" r="232" fill="none" stroke="#C58B00" stroke-opacity="0.22" stroke-width="2"/>
  <!-- Highlight glossy tepi atas -->
  <circle cx="320" cy="320" r="229" fill="none" stroke="url(#rtRim)" stroke-width="6"/>

  <!-- Angka identitas RT 004/006 → "46" -->
  <g filter="url(#rtNumShadow)">
    <text x="322" y="433" fill="url(#rtNum)"
      font-family="'Helvetica Neue', Arial, Helvetica, sans-serif"
      font-weight="900" font-size="300" letter-spacing="-6"
      text-anchor="middle">46</text>
  </g>
</svg>
