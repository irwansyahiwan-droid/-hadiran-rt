<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hadiran RT 004/006</title>
    <meta name="description" content="Aplikasi manajemen arisan & kas RT 004/006, Tanah Baru Beji, Depok — jadwal tarikan, absensi, talangan, dan laporan kas transparan." />
    <!-- Aplikasi internal warga — JANGAN di-index mesin pencari. Nama warga &
         data kas tidak boleh muncul di hasil Google. Diperkuat oleh robots.txt. -->
    <meta name="robots" content="noindex, nofollow" />
    <!-- Status bar mengikuti tema PILIHAN warga, bukan OS (di-override dinamis
         oleh useTheme saat toggle, dan oleh inline script di bawah saat load). -->
    <meta name="theme-color" content="#FAFBFC" />
    <!-- Pasang tema SEBELUM paint pertama: tanpa ini pengguna yang memilih gelap
         melihat kilatan putih tiap buka app (class .dark baru dipasang React
         setelah bundle). Logika harus sama dgn useTheme: TERANG kecuali warga
         sendiri yang menyimpan pilihan 'dark' — preferensi OS diabaikan. -->
    <script>
      try {
        if (localStorage.getItem('hadiran-theme') === 'dark') {
          document.documentElement.classList.add('dark');
          document
            .querySelectorAll('meta[name="theme-color"]')
            .forEach(function (m) { m.setAttribute('content', '#030712'); });
        }
      } catch (e) { /* abaikan (mis. storage diblokir) */ }
    </script>
    <!-- Splash pra-React: dicat di paint PERTAMA (sebelum bundle JS + index.css
         siap), jadi cold-load di browser tak lagi menampilkan kilat kanvas
         kosong. Bahasanya = shimmer .skeleton app (bukan spinner telanjang),
         emerald brand yang bergerak di atas trek netral. App.tsx me-fade &
         menghapus #app-splash begitu sesi auth siap. Style WAJIB inline di sini:
         index.css baru ada setelah bundle dimuat. Ease/gradien disamakan dgn
         token app (ease-out-expo, spring, kanvas, .skeleton). -->
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 60;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; background: #ECF1F7;
        opacity: 1; transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .dark #app-splash { background: #030712; }
      #app-splash.as-hide { opacity: 0; pointer-events: none; }
      .as-logo {
        width: 64px; height: 64px; border-radius: 16px; overflow: hidden;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.10);
        animation: asPop 0.5s cubic-bezier(0.34, 1.4, 0.5, 1) both;
      }
      .as-logo svg { width: 100%; height: 100%; display: block; }
      .as-name {
        margin: 0; font-weight: 700; font-size: 17px; letter-spacing: -0.018em;
        color: #0B1220;
        font-family: 'Sora', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      .dark .as-name { color: #F3F4F6; }
      .as-bar {
        position: relative; width: 128px; height: 4px; border-radius: 999px;
        background: #E9ECEF; overflow: hidden;
      }
      .dark .as-bar { background: #1F2937; }
      .as-bar::after {
        content: ''; position: absolute; inset: 0; transform: translateX(-100%);
        background: linear-gradient(90deg, transparent 0%, rgba(20, 122, 70, 0.55) 50%, transparent 100%);
        animation: asShimmer 1.4s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }
      .dark .as-bar::after {
        background: linear-gradient(90deg, transparent 0%, rgba(45, 212, 150, 0.35) 50%, transparent 100%);
      }
      @keyframes asPop { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
      @keyframes asShimmer { to { transform: translateX(100%); } }
      @media (prefers-reduced-motion: reduce) {
        .as-logo { animation: none; }
        .as-bar::after { animation: none; transform: translateX(0); opacity: 0.5; }
      }
    </style>
    <!-- PWA standalone (iOS) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hadiran RT" />
    <!-- Splash standalone iOS (apple-touch-startup-image) — ikon di tengah canvas.
         TERANG saja, tanpa varian per tema OS: iOS memilih splash sebelum halaman
         jalan, jadi ia tak bisa tahu pilihan tema warga di localStorage. Karena app
         kini default terang, splash terang = tebakan yang benar untuk hampir semua
         warga (yang memilih gelap sendiri lihat splash terang sesaat — trade-off
         sadar, lebih baik daripada splash gelap untuk semua pengguna HP dark).
         PNG di-bake pada tone kanvas AKTIF #ECF1F7 (diverifikasi pixel 10 Jul) —
         sinkron body/sunken/manifest. Bila kanvas berubah: regen via
         scripts/gen-splash.mjs. Tanpa ini iOS standalone = blank putih. -->
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/splash-640x1136.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/splash-750x1334.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/splash-828x1792.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/splash-1170x2532.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/splash-1179x2556.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/splash-1242x2688.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/splash-1284x2778.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/splash-1290x2796.png" />
    <meta property="og:title" content="Hadiran RT 004/006" />
    <meta property="og:description" content="Aplikasi manajemen arisan &amp; kas RT 004/006, Tanah Baru Beji, Depok" />
    <meta property="og:image" content="https://hadiran-rt.vercel.app/og-hadiran.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://hadiran-rt.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hadiran RT 004/006" />
    <meta name="twitter:image" content="https://hadiran-rt.vercel.app/og-hadiran.jpg" />
  </head>
  <body>
    <!-- Splash pertama (lihat <style> di head). Logo di-inline → nol request saat
         paint pertama. Dihapus oleh App.tsx setelah auth siap. -->
    <div id="app-splash" aria-hidden="true">
      <div class="as-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" aria-hidden="true">
          <defs>
            <linearGradient id="sBg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#FFD22B"/><stop offset="0.52" stop-color="#FAC200"/><stop offset="1" stop-color="#E7A300"/>
            </linearGradient>
            <linearGradient id="sDisc" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EDEFF3"/>
            </linearGradient>
            <linearGradient id="sNum" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#1C7C3A"/><stop offset="1" stop-color="#0D4E22"/>
            </linearGradient>
          </defs>
          <rect width="640" height="640" fill="url(#sBg)"/>
          <circle cx="320" cy="320" r="232" fill="url(#sDisc)"/>
          <circle cx="320" cy="320" r="232" fill="none" stroke="#C58B00" stroke-opacity="0.22" stroke-width="2"/>
          <text x="322" y="433" fill="url(#sNum)" font-family="'Helvetica Neue', Arial, Helvetica, sans-serif" font-weight="900" font-size="300" letter-spacing="-6" text-anchor="middle">46</text>
        </svg>
      </div>
      <p class="as-name">Hadiran RT</p>
      <div class="as-bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
