    <!-- Aplikasi internal warga — JANGAN di-index mesin pencari. Nama warga &
         data kas tidak boleh muncul di hasil Google. Diperkuat oleh robots.txt. -->
    <meta name="robots" content="noindex, nofollow" />
    <!-- Pasang tema SEBELUM paint pertama: tanpa ini pengguna dark mode melihat
         kilatan putih tiap buka app (class .dark baru dipasang React setelah bundle).
         Logika harus sama dgn useTheme: localStorage > preferensi OS. -->
    <script>
      try {
        var t = localStorage.getItem('hadiran-theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { /* abaikan (mis. storage diblokir) */ }
    </script>
    <!-- Status bar adaptif (di-override dinamis oleh useTheme saat toggle) -->
    <meta name="theme-color" content="#FAFBFC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0E1A" media="(prefers-color-scheme: dark)" />
    <!-- PWA standalone (iOS) -->
